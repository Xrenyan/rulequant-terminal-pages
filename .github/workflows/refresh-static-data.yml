name: Refresh RuleQuant Static Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15,45 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-static-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Refresh latest draw data
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const statePath = "static-cloud-state.json";
          const importEndpoint = "https://rulequant-terminal.vercel.app/api/import-draws-from-url";
          const drawSourceUrl = "https://thjffv.ag0rkv-4pnok-ljvvrg.xyz:16633/kj/3/2026.html";

          function sortDraws(draws) {
            return [...draws].sort((a, b) => String(a.issue).localeCompare(String(b.issue), "zh-CN", { numeric: true }));
          }

          function latestIssue(draws) {
            return sortDraws(draws).at(-1)?.issue ?? "";
          }

          async function main() {
            const state = JSON.parse(fs.readFileSync(statePath, "utf8"));
            const response = await fetch(`${importEndpoint}?t=${Date.now()}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ baseUrl: drawSourceUrl, fromYear: 2026, toYear: 2026 }),
            });
            if (!response.ok) {
              throw new Error(`Import endpoint failed: ${response.status} ${response.statusText}`);
            }

            const imported = await response.json();
            if (!Array.isArray(imported.records) || imported.records.length === 0) {
              throw new Error("Import endpoint returned no draw records.");
            }

            const currentDraws = Array.isArray(state.draws) ? state.draws : [];
            const incoming = sortDraws(imported.records);
            const currentLatest = latestIssue(currentDraws);
            const incomingLatest = latestIssue(incoming);

            if (Number(incomingLatest || 0) < Number(currentLatest || 0)) {
              console.log(`Skip rollback: incoming ${incomingLatest}, current ${currentLatest}`);
              return;
            }

            state.draws = incoming;
            state.referenceHistory = Array.isArray(state.referenceHistory) ? state.referenceHistory : [];
            state.meta = {
              ...(state.meta ?? {}),
              enabled: true,
              source: "github-pages",
              updatedAt: imported.fetchedAt ?? new Date().toISOString(),
              latestIssue: incomingLatest,
              recordCount: incoming.length,
              message: "GitHub Pages scheduled refresh from draw source",
            };

            fs.writeFileSync(statePath, `${JSON.stringify(state, null, 2)}\n`, "utf8");
            console.log(`Static data ready: issue ${incomingLatest}, draws ${incoming.length}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
      - name: Commit changed data
        run: |
          git config user.name "RuleQuant"
          git config user.email "rulequant-local@example.com"
          git add static-cloud-state.json
          if git diff --cached --quiet; then
            echo "Static data already current."
          else
            git commit -m "Refresh RuleQuant static data"
            git push
          fi
